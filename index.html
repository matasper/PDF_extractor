<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extractor DeLaval</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #1c2333;
    --border:    #30363d;
    --accent:    #1f6feb;
    --accent2:   #388bfd;
    --green:     #3fb950;
    --yellow:    #d29922;
    --red:       #f85149;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.18; pointer-events: none; z-index: 0;
  }

  header {
    position: relative; z-index: 1;
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; gap: 1.5rem;
    height: 64px;
    background: rgba(13,17,23,0.85);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex; align-items: center; gap: 0.6rem;
    font-family: var(--mono); font-weight: 600; font-size: 1rem;
    color: var(--text); letter-spacing: -0.02em;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .badge {
    font-family: var(--mono); font-size: 0.65rem;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); padding: 2px 8px; border-radius: 20px;
  }

  main {
    position: relative; z-index: 1; flex: 1;
    max-width: 1000px; width: 100%; margin: 0 auto;
    padding: 2.5rem 2rem;
    display: flex; flex-direction: column; gap: 1.5rem;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--surface);
    position: relative; overflow: hidden;
  }

  .drop-zone::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(31,111,235,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .drop-zone.drag-over { border-color: var(--green); }

  .drop-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; filter: grayscale(0.3); }
  .drop-title { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; }
  .drop-sub { font-size: 0.85rem; color: var(--muted); font-family: var(--mono); }

  .btn-browse {
    display: inline-block;
    margin-top: 1.2rem; padding: 0.5rem 1.4rem;
    background: var(--accent); color: white;
    border: none; border-radius: 6px;
    font-family: var(--sans); font-size: 0.9rem; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-browse:hover { background: var(--accent2); }

  #file-input { display: none; }

  .status-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.4rem;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.7;
    max-height: 240px;
    overflow-y: auto;
    white-space: pre-wrap; word-break: break-word;
  }
  .status-panel.visible { display: block; }
  .log-ok    { color: var(--green); }
  .log-warn  { color: var(--yellow); }
  .log-err   { color: var(--red); }
  .log-dim   { color: #6e7681; font-size: 0.72rem; }
  .log-step  { color: var(--accent2); font-weight: 600; }

  /* Barra de progreso */
  .progress-wrap {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 1.2rem;
  }
  .progress-wrap.visible { display: block; }
  .progress-label {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
    display: flex; justify-content: space-between;
  }
  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.3s ease;
  }

  .toolbar {
    display: none;
    align-items: center; gap: 0.75rem;
    flex-wrap: wrap;
  }
  .toolbar.visible { display: flex; }

  .btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.55rem 1.2rem; border-radius: 6px;
    font-family: var(--sans); font-size: 0.88rem; font-weight: 600;
    cursor: pointer; border: 1px solid transparent;
    transition: all 0.15s;
  }
  .btn-excel {
    background: #1a3d1a; color: var(--green); border-color: #2a5e2a;
  }
  .btn-excel:hover { background: #204820; }
  .btn-csv {
    background: var(--surface2); color: var(--text); border-color: var(--border);
  }
  .btn-csv:hover { background: var(--surface); border-color: var(--muted); }
  .btn-reset {
    background: transparent; color: var(--muted); border-color: var(--border);
    margin-left: auto;
  }
  .btn-reset:hover { color: var(--red); border-color: var(--red); }

  .item-count {
    font-family: var(--mono); font-size: 0.8rem;
    color: var(--muted);
    padding: 0.4rem 0.8rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .item-count span { color: var(--green); font-weight: 600; }

  .table-wrap {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .table-wrap.visible { display: block; }
  .table-scroll { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }

  thead {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
  }

  th {
    padding: 0.75rem 1rem; text-align: left;
    font-family: var(--mono); font-size: 0.72rem; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
    white-space: nowrap;
  }

  td {
    padding: 0.65rem 1rem;
    border-bottom: 1px solid rgba(48,54,61,0.6);
    color: var(--text); white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(31,111,235,0.05); }

  .td-item   { font-family: var(--mono); color: var(--muted); font-size: 0.75rem; }
  .td-mat    { font-family: var(--mono); font-weight: 600; color: var(--accent2); }
  .td-desc   { color: var(--text); max-width: 320px; overflow: hidden; text-overflow: ellipsis; }
  .td-num    { font-family: var(--mono); text-align: right; }
  .td-net    { font-family: var(--mono); text-align: right; color: var(--green); font-weight: 600; }
  .td-total  { font-family: var(--mono); text-align: right; font-weight: 600; }

  footer {
    position: relative; z-index: 1;
    border-top: 1px solid var(--border);
    padding: 1rem 2rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.35s ease both; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚙</div>
    extractor-delaval
  </div>
  <div class="badge">v3.0 + OCR</div>
</header>

<main>

  <div class="drop-zone fade-up" id="drop-zone">
    <span class="drop-icon">📄</span>
    <div class="drop-title">Arrastrá el PDF acá</div>
    <div class="drop-sub">facturas DeLaval (digitales o escaneadas)</div>
    <button class="btn-browse" onclick="document.getElementById('file-input').click()">
      Seleccionar archivo
    </button>
    <input type="file" id="file-input" accept=".pdf">
  </div>

  <div class="status-panel" id="status-panel"></div>

  <!-- Barra de progreso -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">Procesando...</span>
      <span id="progress-percent">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="toolbar" id="toolbar">
    <div class="item-count" id="item-count"><span>0</span> ítems encontrados</div>
    <button class="btn btn-excel" id="btn-excel" onclick="descargarExcel()">⬇ Descargar Excel</button>
    <button class="btn btn-csv" id="btn-csv" onclick="descargarCSV()">⬇ Descargar CSV</button>
    <button class="btn btn-csv" id="btn-ocr" onclick="descargarOCRraw()" style="display:none">⬇ OCR raw</button>
    <button class="btn btn-reset" onclick="resetear()">✕ Nuevo archivo</button>
  </div>

  <div class="table-wrap fade-up" id="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Item Factura</th>
            <th>Artículo</th>
            <th>Cantidad</th>
            <th style="text-align:right">Precio Unitario</th>
            <th style="text-align:right">Subtotal</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </div>
  </div>

</main>

<footer>
  Los archivos se procesan localmente en tu navegador — ningún dato se sube a internet
</footer>

  '^(\\d{4})\\s+(\\d{7,13})\\s+(\\d{1,3}(?:[.,]\\d+)?)\\s*(' + UNIT_LIST + ')\\s+(.+)$',
  'i'
);
const Y_TOL = 3;

// "1.004,00" → "1004.00" ; "20,00" → "20.00"
function norm(v) {
  if (v == null) return '';
  return String(v).trim().replace(/[.\s]/g, '').replace(',', '.');
}

// ──────────────────────────────────────────────────────
// MÉTODO 1: Extracción por coordenadas (PDFs digitales)
// ──────────────────────────────────────────────────────

async function leerFragmentosPDF(pdf) {
  const fragmentos = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    for (const it of content.items) {
      const s = (it.str || '').trim();
      if (!s) continue;
      fragmentos.push({ str: s, x: it.transform[4], y: it.transform[5], page: p });
    }
  }
  return fragmentos;
}

function filaDe(fragmentos, ref) {
  return fragmentos
    .filter(f => f.page === ref.page && Math.abs(f.y - ref.y) <= Y_TOL)
    .sort((a, b) => a.x - b.x);
}

function buscarDescripcionPorCoords(fragmentos, cand) {
  const debajo = fragmentos
    .filter(f => f.page === cand.page && f.y < cand.y - Y_TOL)
    .sort((a, b) => b.y - a.y);
  let i = 0;
  while (i < debajo.length) {
    const yGrupo = debajo[i].y;
    const grupo = [];
    while (i < debajo.length && Math.abs(debajo[i].y - yGrupo) <= Y_TOL) {
      grupo.push(debajo[i]); i++;
    }
    grupo.sort((a, b) => a.x - b.x);
    if (grupo.some(f => RE_ITEM_ID.test(f.str))) return '';
    const texto = grupo.map(f => f.str).join(' ').replace(/\s+/g, ' ').trim();
    if (!texto) continue;
    if (RE_SKIP.test(texto)) continue;
    return texto;
  }
  return '';
}

function parsearFilaCoords(fila, cand) {
  const idxCand = fila.findIndex(f => f === cand);
  const tokens = fila.slice(idxCand + 1).map(f => f.str);
  let material = null, qty = null, unit = null;
  const numeros = [];
  for (let i = 0; i < tokens.length; i++) {
    const t = tokens[i];
    if (!material) { if (RE_MATERIAL.test(t)) material = t; continue; }
    if (qty === null) {
      const combo = t.match(RE_QTY_UNIT);
      if (combo) { qty = combo[1]; unit = combo[2].toUpperCase(); continue; }
      if (RE_NUM.test(t) && i + 1 < tokens.length && RE_UNIT.test(tokens[i + 1])) {
        qty = t; unit = tokens[i + 1].toUpperCase(); i++; continue;
      }
    }
    if (RE_NUM.test(t)) numeros.push(t);
  }
  if (!material || qty === null || numeros.length < 2) return null;
  return {
    material, qty, unit,
    net: numeros[numeros.length - 2],
    total: numeros[numeros.length - 1]
  };
}

function extraerItemsDeFragmentos(fragmentos) {
  const items = [];
  const yaUsados = new Set();
  for (const cand of fragmentos) {
    if (!RE_ITEM_ID.test(cand.str)) continue;
    const fila = filaDe(fragmentos, cand);
    const datos = parsearFilaCoords(fila, cand);
    if (!datos) continue;
    const clave = `${cand.page}|${cand.str}|${datos.material}`;
    if (yaUsados.has(clave)) continue;
    yaUsados.add(clave);
    const desc = buscarDescripcionPorCoords(fragmentos, cand);
    items.push({
      item: cand.str, material: datos.material, description: desc,
      quantity: norm(datos.qty),
      net: norm(datos.net), total: norm(datos.total)
    });
  }
  items.sort((a, b) => a.item.localeCompare(b.item));
  return items;
}

async function renderPagina(pdfPage, scale = 2) {
  const viewport = pdfPage.getViewport({ scale });
  const canvas = document.createElement('canvas');
  canvas.width  = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  await pdfPage.render({ canvasContext: ctx, viewport }).promise;
  return canvas;
}

async function ocrTodoElPDF(pdf) {
  log('Inicializando motor OCR (puede tardar la primera vez)...', 'step');
  mostrarProgreso('Cargando datos OCR...', 0);

  const worker = await Tesseract.createWorker('eng', 1, {
    logger: m => {
      if (m.status && m.progress != null) {
        if (m.status === 'recognizing text') return;
        actualizarProgreso(m.status, Math.round(m.progress * 100));
      }
    }
  });

  // PSM 6 = "Assume a single uniform block of text" — funciona mejor con tablas
  // que el modo AUTO, que a veces parte la página en columnas y descoloca los datos
  await worker.setParameters({
    tessedit_pageseg_mode: Tesseract.PSM.SINGLE_BLOCK,
    preserve_interword_spaces: '1'
  });

  // Devuelve un array con el texto de cada página
  const textosPorPagina = [];
  try {
    for (let i = 1; i <= pdf.numPages; i++) {
      mostrarProgreso(`OCR página ${i} de ${pdf.numPages}...`, Math.round(((i - 1) / pdf.numPages) * 100));
      const page = await pdf.getPage(i);
      const canvas = await renderPagina(page, 2.5); // mayor escala = mejor reconocimiento
      const { data: { text } } = await worker.recognize(canvas);
      textosPorPagina.push(text);
    }
    mostrarProgreso('OCR completo', 100);
  } finally {
    await worker.terminate();
  }
  return textosPorPagina;
}

// Pre-proceso para corregir errores típicos del OCR antes de parsear
function preprocesarTextoOCR(texto) {
  return texto
    // Normalizar saltos múltiples y trim por línea
    .split('\n').map(l => l.replace(/\s+/g, ' ').trim()).join('\n')
    // O/o/I/l comunes → 0/1 cuando están en bloques numéricos plausibles (ej. al inicio de un código de ítem)
    .replace(/\b[Oo](\d{3,4})\b/g, '0$1')
    .replace(/\bI(\d{3,4})\b/g, '1$1');
}

// Intenta extraer ítem/material/cantidad/net/total/descripción inline de una línea
// Usa enfoque por tokens (más tolerante a ruido OCR entre los campos)
function parsearLineaItem(linea) {
  const tokens = linea.split(/\s+/).filter(Boolean);

  // Buscar par (item ID, material) — permite hasta 3 tokens entre ellos por si OCR mete basura
  let itemIdx = -1, matIdx = -1;
  for (let i = 0; i < tokens.length; i++) {
    if (!RE_ITEM_ID.test(tokens[i])) continue;
    for (let j = i + 1; j <= Math.min(i + 3, tokens.length - 1); j++) {
      if (RE_MATERIAL.test(tokens[j])) { itemIdx = i; matIdx = j; break; }
    }
    if (itemIdx !== -1) break;
  }
  if (itemIdx === -1) return null;

  // Después del material: cantidad + (opcional) unidad
  const reCombined = new RegExp('^(\\d{1,4}(?:[.,]\\d{1,2})?)(' + UNIT_LIST + ')$', 'i');
  let qty = null, unit = '', qtyEndIdx = -1;
  for (let i = matIdx + 1; i < tokens.length; i++) {
    const t = tokens[i];
    const c = t.match(reCombined);
    if (c) { qty = c[1]; unit = c[2].toUpperCase(); qtyEndIdx = i; break; }
    if (/^\d{1,4}(?:[.,]\d{1,2})?$/.test(t)) {
      qty = t;
      if (i + 1 < tokens.length && RE_UNIT.test(tokens[i + 1])) {
        unit = tokens[i + 1].toUpperCase(); qtyEndIdx = i + 1;
      } else {
        qtyEndIdx = i;
      }
      break;
    }
  }
  if (qty === null) return null;

  // Después de la cantidad: índices de los tokens que parecen números (gross, discount, net, total)
  const numIdx = [];
  for (let i = qtyEndIdx + 1; i < tokens.length; i++) {
    const t = tokens[i];
    if (/^-?\d{1,3}(?:[.\s]\d{3})*[,.]\d{1,2}$/.test(t) || /^-?\d{1,5}$/.test(t)) {
      numIdx.push(i);
    }
  }
  if (numIdx.length < 2) return null;

  const lastNum = numIdx[numIdx.length - 1];
  const net = tokens[numIdx[numIdx.length - 2]];
  const total = tokens[lastNum];

  // Si después del último número quedan tokens, son la descripción inline
  // (OCR a veces mete la descripción en la misma línea que los números)
  const inline = tokens.slice(lastNum + 1).join(' ').trim();

  return {
    item: tokens[itemIdx],
    material: tokens[matIdx],
    quantity: qty,
    unit,
    net, total,
    inlineDescription: inline
  };
}

// Convierte un entero "puro" en formato con 2 decimales: "593" → "5,93", "85" → "0,85"
// Asume que en facturas DeLaval los precios SIEMPRE tienen 2 decimales,
// así que un entero sin coma es un OCR comecomas.
function fixDecimal(s) {
  if (!s) return s;
  if (/[,.]/.test(s)) return s;
  if (!/^-?\d+$/.test(s)) return s;
  if (s.length < 2) return s;
  const sign = s[0] === '-' ? '-' : '';
  const num = s.replace('-', '');
  if (num.length === 2) return sign + '0,' + num;
  return sign + num.slice(0, -2) + ',' + num.slice(-2);
}

// Verifica que cantidad × net ≈ total. Si no, prueba correcciones por OCR (coma perdida).
function corregirAritmetica(it) {
  // Pre-fix: enteros sin coma en net/total → asumimos que las últimas 2 cifras son decimales
  const origNet = it.net, origTot = it.total;
  it = { ...it, net: fixDecimal(it.net), total: fixDecimal(it.total) };
  const fixedByDecimal = (origNet !== it.net) || (origTot !== it.total);

  const qty = parseFloat(norm(it.quantity));
  const netRaw = parseFloat(norm(it.net));
  const totRaw = parseFloat(norm(it.total));
  if (!isFinite(qty) || !isFinite(netRaw) || !isFinite(totRaw) || qty === 0) {
    return fixedByDecimal ? { ...it, __corregido: true } : it;
  }

  const tol = (a, b) => Math.abs(a - b) <= Math.max(0.02, Math.abs(b) * 0.005);
  if (tol(qty * netRaw, totRaw)) {
    return fixedByDecimal ? { ...it, __corregido: true } : it;
  }

  // Variantes a probar: dividir/multiplicar net o total por 100 / 1000
  // (típicas de comas decimales perdidas o duplicadas en el OCR)
  const candidatos = [
    [netRaw / 100,  totRaw],
    [netRaw / 1000, totRaw],
    [netRaw,        totRaw / 100],
    [netRaw,        totRaw / 1000],
    [netRaw / 100,  totRaw / 100],
    [netRaw * 100,  totRaw],
    [netRaw,        totRaw * 100],
  ];
  for (const [n, t] of candidatos) {
    if (tol(qty * n, t)) {
      return { ...it, net: n.toFixed(2).replace('.', ','), total: t.toFixed(2).replace('.', ','), __corregido: true };
    }
  }
  // Última opción: si tenemos qty y total bien, recalcular net = total / qty
  if (totRaw > 0 && tol(qty * (totRaw / qty), totRaw)) {
    const newNet = totRaw / qty;
    return { ...it, net: newNet.toFixed(2).replace('.', ','), __corregido: true };
  }
  return it;
}

// Buscar la descripción en las líneas siguientes
function buscarDescripcionTexto(lineas, idxItem) {
  for (let j = idxItem + 1; j < Math.min(lineas.length, idxItem + 6); j++) {
    const next = lineas[j];
    if (!next) continue;
    // Si encontramos otra fila de ítem, paramos
    if (/(\d{4})\s+(\d{7,13})\s+\d/.test(next)) break;
    if (RE_SKIP.test(next)) continue;
    // Filtrar líneas que parecen ser solo números o muy cortas
    if (next.length < 3) continue;
    if (/^[\d\s.,-]+$/.test(next)) continue;
    return next;
  }
  return '';
}

// Parser principal de texto OCR
function extraerItemsDeTexto(texto) {
  texto = preprocesarTextoOCR(texto);
  const lineas = texto.split('\n').map(l => l.trim()).filter(l => l.length > 0);

  const items = [];
  const yaUsados = new Set();

  for (let i = 0; i < lineas.length; i++) {
    // Probar parseo con la línea sola, y luego combinándola con 1, 2, 3 líneas siguientes
    let parsed = null;
    let consumido = 1;
    for (let extra = 0; extra <= 3 && i + extra < lineas.length; extra++) {
      const linea = lineas.slice(i, i + extra + 1).join(' ');
      parsed = parsearLineaItem(linea);
      if (parsed) { consumido = extra + 1; break; }
    }
    if (!parsed) continue;

    const clave = `${parsed.item}|${parsed.material}`;
    if (yaUsados.has(clave)) continue;
    yaUsados.add(clave);

    // Descripción: primero la inline (si OCR pegó la descripción al final de la línea),
    // si no, buscar en las siguientes líneas
    let description = parsed.inlineDescription || '';
    if (!description) description = buscarDescripcionTexto(lineas, i + consumido - 1);

    parsed = corregirAritmetica(parsed);

    items.push({
      item: parsed.item,
      material: parsed.material,
      description,
      quantity: norm(parsed.quantity),
      net: norm(parsed.net),
      total: norm(parsed.total),
      __corregido: !!parsed.__corregido
    });
  }

  items.sort((a, b) => a.item.localeCompare(b.item));
  return items;
}

// ──────────────────────────────────────────────────────
// Procesar archivo (orquesta los dos métodos)
// ──────────────────────────────────────────────────────

async function procesarArchivo(file) {
  if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
    log('⚠ Solo se aceptan archivos PDF', 'warn'); return;
  }
  resetUI();
  nombreArchivo = file.name.replace(/\.pdf$/i, '');
  mostrarStatus();
  log(`📄 ${file.name}`, 'step');

  try {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    log(`Páginas: ${pdf.numPages}`, 'dim');

    // ── Intento 1: método rápido (PDF digital) ──
    log('▸ Probando extracción directa de texto...', 'step');
    const fragmentos = await leerFragmentosPDF(pdf);
    log(`  ${fragmentos.length} fragmentos de texto encontrados`, 'dim');

    let items = [];
    if (fragmentos.length > 50) {
      items = extraerItemsDeFragmentos(fragmentos);
      log(`  ${items.length} ítems encontrados con método directo`, 'dim');
    } else {
      log(`  Texto insuficiente — el PDF probablemente es un escaneo`, 'warn');
    }

    // ── Intento 2: OCR si lo anterior falló ──
    if (items.length === 0) {
      log('▸ Cambiando a OCR (esto puede tardar 1-3 minutos)...', 'step');
      const textosPorPagina = await ocrTodoElPDF(pdf);
      ocrTextosPorPagina = textosPorPagina; // guardar para descarga
      const totalChars = textosPorPagina.reduce((s, t) => s + t.length, 0);
      log(`  OCR generó ${totalChars.toLocaleString()} caracteres de texto`, 'dim');
      ocultarProgreso();

      // Parsear página por página y reportar
      const yaUsados = new Set();
      let totalCorr = 0;
      const paginasVacias = [];
      for (let p = 0; p < textosPorPagina.length; p++) {
        const itemsPag = extraerItemsDeTexto(textosPorPagina[p]);
        let agregados = 0, corregidos = 0;
        for (const it of itemsPag) {
          const k = `${it.item}|${it.material}`;
          if (yaUsados.has(k)) continue;
          yaUsados.add(k);
          if (it.__corregido) corregidos++;
          items.push(it);
          agregados++;
        }
        totalCorr += corregidos;
        if (agregados === 0) paginasVacias.push(p + 1);
        log(`  Página ${p + 1}: ${agregados} ítem(s)${corregidos ? ` (${corregidos} con números corregidos)` : ''}`, 'dim');
      }
      items.sort((a, b) => a.item.localeCompare(b.item));
      if (totalCorr > 0) {
        log(`  ${totalCorr} ítem(s) con números autocorregidos`, 'dim');
      }

      // Volcar primeras 15 líneas de la primera página vacía como diagnóstico
      if (paginasVacias.length > 0) {
        const muestra = paginasVacias[0];
        log(`▸ Páginas sin ítems: ${paginasVacias.join(', ')}`, 'warn');
        log(`  Muestra del OCR de la página ${muestra} (primeras 15 líneas):`, 'dim');
        const lineas = (textosPorPagina[muestra - 1] || '').split('\n').filter(l => l.trim()).slice(0, 15);
        for (const l of lineas) log(`  | ${l}`, 'dim');
        log(`  Si querés que afine, descargá el OCR completo con el botón ⬇ OCR raw`, 'dim');
      }
    }

    if (items.length === 0) {
      log('⚠ No se encontraron ítems ni con OCR.', 'warn');
      log('  Es posible que el formato de la factura sea distinto al esperado.', 'dim');
      log('  Compartime una imagen del PDF y afino los patrones.', 'dim');
      return;
    }

    itemsGlobal = items;
    log(`✅ ${items.length} ítem(s) extraídos correctamente`, 'ok');
    renderTabla(items);
    mostrarToolbar(items.length);

  } catch (e) {
    log(`❌ Error: ${e.message}`, 'err');
    console.error(e);
    ocultarProgreso();
  }
}

// ── UI helpers ────────────────────────────────────────
const panel        = document.getElementById('status-panel');
const toolbar      = document.getElementById('toolbar');
const tableWrap    = document.getElementById('table-wrap');
const tbody        = document.getElementById('tabla-body');
const countEl      = document.getElementById('item-count').querySelector('span');
const progressWrap = document.getElementById('progress-wrap');
const progressText = document.getElementById('progress-text');
const progressPct  = document.getElementById('progress-percent');
const progressFill = document.getElementById('progress-fill');

function log(msg, tipo = '') {
  const d = document.createElement('div');
  d.textContent = msg;
  if (tipo === 'ok')   d.className = 'log-ok';
  if (tipo === 'warn') d.className = 'log-warn';
  if (tipo === 'err')  d.className = 'log-err';
  if (tipo === 'dim')  d.className = 'log-dim';
  if (tipo === 'step') d.className = 'log-step';
  panel.appendChild(d);
  panel.scrollTop = panel.scrollHeight;
}

function mostrarStatus() { panel.classList.add('visible'); }

function mostrarProgreso(label, pct) {
  progressWrap.classList.add('visible');
  progressText.textContent = label;
  progressPct.textContent = pct + '%';
  progressFill.style.width = pct + '%';
}
function actualizarProgreso(label, pct) { mostrarProgreso(label, pct); }
function ocultarProgreso() { progressWrap.classList.remove('visible'); }

function mostrarToolbar(n) {
  countEl.textContent = n;
  toolbar.classList.add('visible');
  tableWrap.classList.add('visible');
  // Mostrar botón "OCR raw" solo si tenemos texto OCR guardado
  document.getElementById('btn-ocr').style.display = ocrTextosPorPagina.length ? '' : 'none';
}

function resetUI() {
  panel.innerHTML = '';
  tbody.innerHTML = '';
  panel.classList.remove('visible');
  toolbar.classList.remove('visible');
  tableWrap.classList.remove('visible');
  ocultarProgreso();
  itemsGlobal = [];
  ocrTextosPorPagina = [];
  document.getElementById('btn-ocr').style.display = 'none';
}

function resetear() {
  resetUI();
  document.getElementById('file-input').value = '';
}

function renderTabla(items) {
  tbody.innerHTML = '';
  for (const it of items) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-item">${it.item}</td>
      <td class="td-mat">${it.material}</td>
      <td class="td-num">${it.quantity}</td>
      <td class="td-net">${it.net}</td>
      <td class="td-total">${it.total}</td>
    `;
    tbody.appendChild(tr);
  }
}

// ── Descargas ─────────────────────────────────────────
// Extrae el número de factura del nombre de archivo (ej. "Invoice 2738061161" → "2738061161")
function extraerNroFactura(nom) {
  if (!nom) return '';
  const m = nom.match(/(\d{7,})/);
  return m ? m[1] : nom;
}

// Decodifica el template Libro1 (base64) a ArrayBuffer
function decodificarTemplate() {
  const bin = atob(LIBRO1_TEMPLATE_B64);
  const buf = new ArrayBuffer(bin.length);
  const view = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
  return buf;
}

// Usa Libro1.xlsx como plantilla base (preserva colores, bordes, fuentes, celdas combinadas).
// Sobreescribe las filas de items y ajusta los totales según la cantidad real.
async function descargarExcel() {
  if (typeof ExcelJS === 'undefined') {
    log('❌ ExcelJS no se cargó. Recargá la página.', 'err');
    return;
  }

  const wb = new ExcelJS.Workbook();
  await wb.xlsx.load(decodificarTemplate());
  const ws = wb.getWorksheet('Hoja1') || wb.worksheets[0];

  const N = itemsGlobal.length;
  const DATA_START = 44;
  const T = DATA_START + N;          // fila de totales (donde vos cargás G/H/I)
  const ROW_CONV = T + 1;
  const ROW_CTRL = T + 2;
  const NUM_COLS = 28;               // de A hasta AB

  // 0) Snapshot de estilos del template ANTES de modificar nada.
  //    ExcelJS no acepta `cell.style = {...}` como reemplazo total (lo merge-a),
  //    así que leemos y escribimos cada propiedad individualmente (font, fill, border, alignment, numFmt).
  const TEMPLATE_ITEM_ROW   = 44;
  const TEMPLATE_TOTALS_ROW = 184;
  const clone = (o) => o ? JSON.parse(JSON.stringify(o)) : null;

  function snapshotEstilo(rowNum) {
    const out = {};
    const row = ws.getRow(rowNum);
    for (let c = 1; c <= NUM_COLS; c++) {
      const cell = row.getCell(c);
      out[c] = {
        font:      clone(cell.font),
        fill:      clone(cell.fill),
        border:    clone(cell.border),
        alignment: clone(cell.alignment),
        numFmt:    cell.numFmt || null,
      };
    }
    return out;
  }
  function aplicarEstilo(rowNum, snap) {
    const row = ws.getRow(rowNum);
    for (let c = 1; c <= NUM_COLS; c++) {
      const cell = row.getCell(c);
      const s = snap[c];
      // Asignamos siempre las 5 propiedades (con defaults si no hay)
      cell.font      = s.font      ? clone(s.font)      : { name: 'Calibri', size: 11 };
      cell.fill      = s.fill      ? clone(s.fill)      : { type: 'pattern', pattern: 'none' };
      cell.border    = s.border    ? clone(s.border)    : {};
      cell.alignment = s.alignment ? clone(s.alignment) : {};
      cell.numFmt    = s.numFmt    || 'General';
    }
  }

  const itemStyles   = snapshotEstilo(TEMPLATE_ITEM_ROW);
  const totalsStyles = snapshotEstilo(TEMPLATE_TOTALS_ROW);

  // 1) Pre-cargar los datos que conocemos del PDF
  ws.getCell('E7').value = 'DeLaval';
  ws.getCell('E8').value = extraerNroFactura(nombreArchivo);

  // 2) Limpiar valores de las filas 44 hasta el final del template.
  //    No tocamos los estilos acá; los reseteamos después celda por celda al aplicar el estilo correcto.
  const TEMPLATE_LAST = Math.max(ws.actualRowCount, 186);
  for (let r = DATA_START; r <= TEMPLATE_LAST; r++) {
    const row = ws.getRow(r);
    for (let c = 1; c <= NUM_COLS; c++) {
      row.getCell(c).value = null;
    }
  }

  // 3) Filas de items con fórmulas (la fila de totales se inserta dinámicamente en T)
  for (let i = 0; i < N; i++) {
    const r = DATA_START + i;
    const it = itemsGlobal[i];
    const qty = parseFloat(it.quantity) || 0;
    const net = parseFloat(it.net) || 0;
    const row = ws.getRow(r);

    row.getCell('B').value = String(it.item);
    row.getCell('C').value = String(it.material);
    row.getCell('D').value = qty;
    row.getCell('E').value = net;
    row.getCell('F').value = { formula: `+E${r}*D${r}` };
    row.getCell('G').value = { formula: `+$G$${T}/$F$${T}*F${r}` };
    row.getCell('H').value = { formula: `+$H$${T}/$F$${T}*F${r}` };
    row.getCell('I').value = { formula: `+$I$${T}/$F$${T}*F${r}` };
    row.getCell('J').value = { formula: `+G${r}+F${r}+I${r}+H${r}` };
    row.getCell('K').value = { formula: `+J${r}*E$13` };
    row.getCell('P').value = { formula: `+K${r}*L${r}/100` };
    row.getCell('Q').value = { formula: `+K${r}*M${r}/100` };
    row.getCell('R').value = { formula: `+K${r}*N${r}/100` };
    row.getCell('S').value = { formula: `+K${r}*O${r}/100` };
    row.getCell('T').value = { formula: `SUM(P${r}:S${r})` };
    row.getCell('U').value = { formula: `+$U$${T}/$K$${T}*K${r}` };
    row.getCell('V').value = { formula: `+$V$${T}/$K$${T}*K${r}` };
    row.getCell('W').value = { formula: `+$W$${T}/$K$${T}*K${r}` };
    row.getCell('X').value = { formula: `+$X$${T}/$K$${T}*K${r}` };
    row.getCell('Y').value = { formula: `SUM(U${r}:X${r})` };
    row.getCell('Z').value = { formula: `+K${r}+T${r}+Y${r}` };
    row.getCell('AA').value = { formula: `+Z${r}/D${r}` };
    row.getCell('AB').value = { formula: `AA${r}/(E${r}*$E$13)-1` };

    // Aplicar el estilo de "fila de item" (sobreescribe el de totales que pueda tener la fila 184 original)
    aplicarEstilo(r, itemStyles);
  }

  // 4) Fila de totales (equivalente a la 184 del template original)
  const totRow = ws.getRow(T);
  totRow.getCell('F').value = { formula: `SUM(F${DATA_START}:F${T - 1})` };
  totRow.getCell('J').value = { formula: `SUM(J${DATA_START}:J${T - 1})` };
  totRow.getCell('K').value = { formula: `SUM(K${DATA_START}:K${T - 1})` };
  totRow.getCell('P').value = { formula: `SUM(P${DATA_START}:P${T - 1})` };
  totRow.getCell('Q').value = { formula: `SUM(Q${DATA_START}:Q${T - 1})` };
  totRow.getCell('R').value = { formula: `SUM(R${DATA_START}:R${T - 1})` };
  totRow.getCell('S').value = { formula: `SUM(S${DATA_START}:S${T - 1})` };
  totRow.getCell('T').value = { formula: `SUM(T${DATA_START}:T${T - 1})` };
  totRow.getCell('U').value = { formula: '+E35+J28/F23' };
  totRow.getCell('V').value = { formula: '+(J35+J36)/E12+E30+E31+E32' };
  totRow.getCell('W').value = { formula: 'E37' };
  totRow.getCell('X').value = { formula: 'J27/F23+K20/E12+E36' };
  totRow.getCell('Y').value = { formula: `SUM(Y${DATA_START}:Y${T - 1})` };
  totRow.getCell('Z').value = { formula: `SUM(Z${DATA_START}:Z${T - 1})` };

  // Aplicar el estilo de "fila de totales" (negritas, etc.) a la fila T
  aplicarEstilo(T, totalsStyles);

  // 5) Fila de conversiones (equivalente a la 185)
  const convRow = ws.getRow(ROW_CONV);
  convRow.getCell('F').value = { formula: `+F${T}*$E$13` };
  convRow.getCell('G').value = { formula: `G${T}/F${T}` };
  convRow.getCell('H').value = { formula: `+H${T}*$E$13` };
  convRow.getCell('I').value = { formula: `+I${T}*$E$13` };
  convRow.getCell('J').value = { formula: `J${T}/F${T}-1` };
  convRow.getCell('N').value = 'Control';
  convRow.getCell('P').value = { formula: '+J24/E12' };
  convRow.getCell('Q').value = { formula: '+J22/E12' };
  convRow.getCell('R').value = { formula: '+J23/E12' };
  convRow.getCell('Z').value = { formula: `Z${T}/F${ROW_CONV}-1` };

  // 6) Fila de control final (equivalente a la 186)
  const ctrlRow = ws.getRow(ROW_CTRL);
  ctrlRow.getCell('G').value = { formula: `SUM(G${DATA_START}:G${T})` };
  ctrlRow.getCell('Z').value = { formula: `Z${T}/K${T}-1` };

  // 7) Forzar recálculo al abrir
  wb.calcProperties = wb.calcProperties || {};
  wb.calcProperties.fullCalcOnLoad = true;

  // 8) Generar el .xlsx y descargar
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${nombreArchivo}_costeo.xlsx`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function descargarOCRraw() {
  if (!ocrTextosPorPagina.length) return;
  const texto = ocrTextosPorPagina
    .map((t, i) => `===== PÁGINA ${i + 1} =====\n${t}`)
    .join('\n\n');
  const blob = new Blob([texto], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${nombreArchivo}_ocr_raw.txt`;
  a.click();
}

function descargarCSV() {
  const HEADS = ['Item Factura', 'Artículo', 'Cantidad', 'Precio Unitario', 'Subtotal'];
  const rows = [HEADS, ...itemsGlobal.map(it => [
    it.item, it.material, it.quantity, it.net, it.total
  ])];
  const csv = rows.map(r => r.map(v => {
    const s = String(v ?? '');
    return /[;"\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(';')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${nombreArchivo}_items.csv`;
  a.click();
}

// ── Drag & Drop ──────────────────────────────────────
// Registramos los listeners dentro de un try/catch para que cualquier error puntual
// no impida que el botón de selección funcione.
try {
  const dropZone  = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  if (!dropZone || !fileInput) {
    console.error('[extractor] No se encontró #drop-zone o #file-input en el DOM');
  } else {
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) procesarArchivo(file);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) procesarArchivo(fileInput.files[0]); });
    dropZone.addEventListener('click', e => { if (e.target.tagName !== 'BUTTON') fileInput.click(); });
    console.log('[extractor] Listeners de drag&drop registrados OK');
  }
} catch (err) {
  console.error('[extractor] Error al registrar listeners:', err);
}
